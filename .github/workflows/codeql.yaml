name: Reusable CodeQl analysis

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      java_version:
        required: false
        type: string
        default: "17"
      go_version:
        required: false
        type: string
        default: "1.20"
      python_version:
        required: false
        type: string
        default: "3.10"
      python_architecture:
        required: false
        type: string
        default: x64
      working_directory:
        required: false
        type: string
        default: ./
    secrets:
      GH_TOKEN:
        required: true

jobs:
  codeql-scan:
    name: Analyze source code
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.repository }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python_version }}
          architecture: ${{ inputs.python_architecture }}

      - name: Set up Java
        if: ${{ inputs.language == 'java' }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: "zulu"
          java-version: ${{ inputs.java_version }}

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <mirrors>
              <mirror>
                <id>central-mirror</id>
                <name>Central Mirror</name>
                <url>https://repo1.maven.org/maven2</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          EOF

      - name: Set up Go
        if: ${{ inputs.language == 'go' }}
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: ${{ inputs.go_version }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          languages: ${{ inputs.language }}, actions

      - name: Autobuild if compiled language
        if: ${{ inputs.language == 'java' || inputs.language == 'go'}}
        uses: github/codeql-action/autobuild@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        with:
          working-directory: ${{ inputs.working_directory }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
