name: Deploy to GitHub Pages
on:
  workflow_call:
    inputs:
      destination_dir:
        required: false
        type: string
        default: ''
      program_html:
        required: false
        type: string
      program_epub:
        required: false
        type: string
      program_pdf:
        required: false
        type: string
      program:
        required: false
        type: string
      publish_branch:
        required: true
        type: string
      publish_dir:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        required: true

jobs:
  build_adoc_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: asciidoctor build
    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        ref: ${{ inputs.ref }}
        submodules: true
        fetch-depth: 0

    - name: Update submodules to latest main
      run: |
        git submodule foreach --recursive git fetch origin
        git submodule foreach --recursive git checkout origin/main    

    - name: Build html
      id: adocbuild_html
      if: ${{ inputs.program_html != '' }}
      uses: docker://asciidoctor/docker-asciidoctor:1.106@sha256:6266e05784c2d8ece9d9fe5e593b12c3beebebbc467135fd6f4a56269c93cea3
      with:
        args: bash -ec "${{ inputs.program_html }}"

    - name: Build epub
      id: adocbuild_epub
      if: ${{ inputs.program_epub != '' }}
      uses: docker://asciidoctor/docker-asciidoctor:1.106@sha256:6266e05784c2d8ece9d9fe5e593b12c3beebebbc467135fd6f4a56269c93cea3
      with:
        args: bash -ec "${{ inputs.program_epub }}"

    - name: Build pdf
      id: adocbuild_pdf
      if: ${{ inputs.program_pdf != '' }}
      uses: docker://asciidoctor/docker-asciidoctor:1.106@sha256:6266e05784c2d8ece9d9fe5e593b12c3beebebbc467135fd6f4a56269c93cea3
      with:
        args: bash -ec "${{ inputs.program_pdf }}"

    - name: Build generic
      id: adocbuild_generic
      if: ${{ inputs.program != '' }}
      uses: docker://asciidoctor/docker-asciidoctor:1.106@sha256:6266e05784c2d8ece9d9fe5e593b12c3beebebbc467135fd6f4a56269c93cea3
      with:
        args: bash -ec "${{ inputs.program }}"

    - name: Deploy w/destination
      if: ${{ inputs.destination_dir != '' }}
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
      with:
        github_token: ${{ secrets.GH_TOKEN }}
        publish_branch: ${{ inputs.publish_branch }}
        publish_dir: ${{ inputs.publish_dir }}
        destination_dir: ${{ inputs.destination_dir }}

    - name: Deploy w/o destination
      if: ${{ inputs.destination_dir == '' }}
      uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4
      with:
        github_token: ${{ secrets.GH_TOKEN }}
        publish_branch: ${{ inputs.publish_branch }}
        publish_dir: ${{ inputs.publish_dir }}
