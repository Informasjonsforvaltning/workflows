name: Build adocs and deploy specification to Github Pages
on:
  workflow_call:
    inputs:
      files:
        required: true
        type: string
      host:
        required: true
        type: string
      ontology:
        required: true
        type: string
      ontology-type:
        required: true
        type: string
      program_html:
        required: false
        type: string
      program_epub:
        required: false
        type: string
      program_pdf:
        required: false
        type: string
      program:
        required: false
        type: string
      ref:
        required: false
        type: string
        default: ''
      update-submodules:
        required: false
        type: boolean
        default: true
      version:
        required: false
        type: string
        default: ''
    secrets:
      GH_TOKEN:
        required: false
      STATIC_RDF_SERVER_API_KEY:
        required: true

jobs:
  upload_file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref }}
          submodules: ${{ inputs.update-submodules }}
          fetch-depth: 0

      - name: Update submodules to latest main
        run: |
          git submodule foreach --recursive git fetch origin
          git submodule foreach --recursive git checkout origin/main    

      - name: Build html
        id: adocbuild_html
        if: ${{ inputs.program_html != '' }}
        uses: docker://asciidoctor/docker-asciidoctor:1.106@sha256:6266e05784c2d8ece9d9fe5e593b12c3beebebbc467135fd6f4a56269c93cea3
        with:
          args: bash -ec "${{ inputs.program_html }}"

      - name: Build epub
        id: adocbuild_epub
        if: ${{ inputs.program_epub != '' }}
        uses: docker://asciidoctor/docker-asciidoctor:1.106@sha256:6266e05784c2d8ece9d9fe5e593b12c3beebebbc467135fd6f4a56269c93cea3
        with:
          args: bash -ec "${{ inputs.program_epub }}"

      - name: Build pdf
        id: adocbuild_pdf
        if: ${{ inputs.program_pdf != '' }}
        uses: docker://asciidoctor/docker-asciidoctor:1.106@sha256:6266e05784c2d8ece9d9fe5e593b12c3beebebbc467135fd6f4a56269c93cea3
        with:
          args: bash -ec "${{ inputs.program_pdf }}"

      - name: Build generic
        id: adocbuild_generic
        if: ${{ inputs.program != '' }}
        uses: docker://asciidoctor/docker-asciidoctor:1.106@sha256:6266e05784c2d8ece9d9fe5e593b12c3beebebbc467135fd6f4a56269c93cea3
        with:
          args: bash -ec "${{ inputs.program }}"

      - name: Upload files to static-rdf-server
        uses: Informasjonsforvaltning/upload-files-to-static-rdf-server-action@f9b41f11e07006762215dbd80a6e09b97834f93c # v3.3.0
        id: upload-files
        with:
          ontology-type: ${{ inputs.ontology-type }}
          ontology: ${{ inputs.ontology }}
          version: ${{ inputs.version }}
          host: ${{ inputs.host }}
          api-key: ${{ secrets.STATIC_RDF_SERVER_API_KEY }}
          files: |
            ${{ inputs.files }}
